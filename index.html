<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPzoneFlix 🎬</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #141414;
      --surface:  #1f1f1f;
      --surface2: #2c2c2c;
      --accent:   #e50914;
      --text:     #e5e5e5;
      --muted:    #888;
      --card-w:   210px;

      /* warna per source */
      --yt:  #ff0000;
      --dm:  #0066dc;
      --vm:  #1ab7ea;
      --kx:  #f5a623;
      --rb:  #00c853;
      --lk:  #aa00ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
      padding: 11px 4%;
      background: rgba(0,0,0,0.93);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .logo {
      font-size: 1.5rem; font-weight: 900;
      color: var(--accent); letter-spacing: -1px; text-decoration: none;
      white-space: nowrap;
    }
    .source-filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 700;
      cursor: pointer; border: 2px solid transparent;
      transition: all .18s; user-select: none; opacity: .38; white-space: nowrap;
    }
    .pill.on { opacity: 1; }
    .pill[data-src="youtube"]     { border-color: var(--yt); color: var(--yt); }
    .pill[data-src="dailymotion"] { border-color: var(--dm); color: var(--dm); }
    .pill[data-src="vimeo"]       { border-color: var(--vm); color: var(--vm); }
    .pill[data-src="klikxxi"]     { border-color: var(--kx); color: var(--kx); }
    .pill[data-src="rebahin"]     { border-color: var(--rb); color: var(--rb); }
    .pill[data-src="lk21"]        { border-color: var(--lk); color: var(--lk); }
    .pill[data-src="youtube"].on     { background: var(--yt); color:#fff; }
    .pill[data-src="dailymotion"].on { background: var(--dm); color:#fff; }
    .pill[data-src="vimeo"].on       { background: var(--vm); color:#fff; }
    .pill[data-src="klikxxi"].on     { background: var(--kx); color:#000; }
    .pill[data-src="rebahin"].on     { background: var(--rb); color:#000; }
    .pill[data-src="lk21"].on        { background: var(--lk); color:#fff; }

    .search-bar { margin-left: auto; display: flex; gap: 7px; }
    .search-bar input {
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px; color: white; padding: 7px 13px; font-size: 13px;
      width: 240px; outline: none; transition: border-color .2s;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar button {
      background: var(--accent); border: none; color: white;
      border-radius: 6px; padding: 7px 15px; cursor: pointer;
      font-weight: 700; font-size: 13px; transition: opacity .2s; white-space: nowrap;
    }
    .search-bar button:hover { opacity: .82; }

    /* ── HERO ── */
    .hero { width: 100%; background: #000; }
    .hero iframe {
      width: 100%; height: 56.25vw; max-height: 78vh;
      border: none; display: block;
    }
    .hero-placeholder {
      width: 100%; height: min(56.25vw, 78vh);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: #080808; color: var(--muted);
    }
    .hero-placeholder .icon { font-size: 3.5rem; }
    .hero-placeholder p { font-size: .95rem; }

    /* ── NOW PLAYING BAR ── */
    .now-bar {
      display: none; padding: 13px 4%;
      background: linear-gradient(to bottom,#000,var(--bg));
      align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .now-bar.show { display: flex; }
    .src-badge {
      font-size: 10px; font-weight: 800; padding: 3px 9px;
      border-radius: 4px; text-transform: uppercase; white-space: nowrap;
    }
    .src-badge.youtube     { background: var(--yt); color:#fff; }
    .src-badge.dailymotion { background: var(--dm); color:#fff; }
    .src-badge.vimeo       { background: var(--vm); color:#fff; }
    .src-badge.klikxxi     { background: var(--kx); color:#000; }
    .src-badge.rebahin     { background: var(--rb); color:#000; }
    .src-badge.lk21        { background: var(--lk); color:#fff; }
    .now-bar h1 { font-size: clamp(13px,2vw,21px); font-weight:700; flex:1; }

    /* ── SECTIONS ── */
    .sections { padding: 0 4% 40px; }
    .section  { margin-top: 28px; }
    .sec-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 11px;
    }
    .sec-title  { font-size: clamp(13px,1.5vw,18px); font-weight:700; }
    .sec-count  { font-size: 11px; color: var(--muted); }
    .view-btns  { margin-left: auto; display: flex; gap: 5px; }
    .btn-v {
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
      color: white; border-radius: 5px; padding: 3px 9px;
      cursor: pointer; font-size: 12px; transition: background .15s;
    }
    .btn-v:hover, .btn-v.on { background: var(--accent); border-color: var(--accent); }

    /* ── CAROUSEL / GRID ── */
    .carousel {
      display: flex; gap: 9px; overflow-x: auto;
      scroll-behavior: smooth; padding-bottom: 5px;
    }
    .carousel::-webkit-scrollbar { height: 3px; }
    .carousel::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
      gap: 11px;
    }

    /* ── CARD ── */
    .card {
      flex: 0 0 var(--card-w); border-radius: 7px; overflow: hidden;
      background: var(--surface); cursor: pointer; position: relative;
      transition: transform .22s, box-shadow .22s;
    }
    .card:hover {
      transform: scale(1.07); z-index: 10;
      box-shadow: 0 14px 36px rgba(0,0,0,.88);
    }
    .card.active { outline: 3px solid var(--accent); outline-offset: -3px; }
    .card::before {
      content: '▶'; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; color: #fff;
      background: rgba(0,0,0,.45); opacity: 0;
      transition: opacity .18s; pointer-events: none; z-index: 2;
    }
    .card:hover::before { opacity: 1; }
    .card-strip { height: 3px; width: 100%; }
    .card-strip.youtube     { background: var(--yt); }
    .card-strip.dailymotion { background: var(--dm); }
    .card-strip.vimeo       { background: var(--vm); }
    .card-strip.klikxxi     { background: var(--kx); }
    .card-strip.rebahin     { background: var(--rb); }
    .card-strip.lk21        { background: var(--lk); }
    .card-thumb {
      width: 100%; aspect-ratio: 16/9; object-fit: cover;
      display: block; background: var(--surface2);
    }
    .card-info { padding: 7px 9px 9px; }
    .card-title {
      font-size: 12px; color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4;
    }
    .card-meta { display: flex; align-items: center; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
    .mini-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px;
      border-radius: 3px; text-transform: uppercase; white-space: nowrap;
    }
    .mini-badge.youtube     { background: rgba(255,0,0,.15);    color: var(--yt); }
    .mini-badge.dailymotion { background: rgba(0,102,220,.15);  color: var(--dm); }
    .mini-badge.vimeo       { background: rgba(26,183,234,.15); color: var(--vm); }
    .mini-badge.klikxxi     { background: rgba(245,166,35,.15); color: var(--kx); }
    .mini-badge.rebahin     { background: rgba(0,200,83,.15);   color: var(--rb); }
    .mini-badge.lk21        { background: rgba(170,0,255,.15);  color: var(--lk); }
    .card-dur   { font-size: 10px; color: var(--muted); }
    .card-rating { font-size: 10px; color: #f5c518; }
    .card-genre  { font-size: 10px; color: var(--muted); }

    /* ── FILM MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,.88); align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--surface); border-radius: 10px;
      width: min(92vw, 960px); max-height: 90vh;
      overflow: hidden; position: relative;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.9);
    }
    .modal-head {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; background: var(--surface2);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .modal-head h2 { font-size: 15px; flex: 1; }
    .modal-close {
      background: none; border: none; color: var(--muted);
      font-size: 1.4rem; cursor: pointer; line-height: 1;
      padding: 0 4px; transition: color .15s;
    }
    .modal-close:hover { color: white; }
    .modal-frame-wrap { flex: 1; position: relative; min-height: 0; }
    .modal-frame-wrap iframe {
      width: 100%; height: 100%; min-height: 320px;
      max-height: 68vh; border: none; display: block;
    }
    .modal-info {
      padding: 10px 16px 14px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      border-top: 1px solid rgba(255,255,255,.07);
    }
    .modal-open-btn {
      margin-left: auto; background: var(--accent); color: white;
      border: none; border-radius: 6px; padding: 7px 16px;
      cursor: pointer; font-size: 13px; font-weight: 700;
      text-decoration: none; display: inline-block;
    }
    .modal-open-btn:hover { opacity: .85; }

    /* ── SPINNER ── */
    .spinner-wrap {
      display: flex; align-items: center; gap: 11px;
      padding: 24px 0; color: var(--muted); font-size: 13px;
    }
    .spinner {
      width: 26px; height: 26px; flex-shrink: 0;
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 22px; right: 22px;
      background: #2a2a2a; color: white; padding: 11px 17px;
      border-radius: 8px; font-size: 13px; opacity: 0;
      transform: translateY(14px); transition: all .26s;
      z-index: 999; max-width: 310px; pointer-events: none;
      box-shadow: 0 4px 18px rgba(0,0,0,.6);
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 26px; color: var(--muted);
      font-size: 11px; border-top: 1px solid rgba(255,255,255,.05); margin-top: 10px;
    }

    /* ── AD BANNER ── */
    .ad-native {
      padding: 14px 4% 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .ad-banner-item {
      width: 320px;
      height: 50px;
      overflow: hidden;
    }
  </style>

          allow="autoplay; encrypted-media; fullscreen"
          allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      </div>

        <span class="src-badge" id="modalBadge2"></span>
        <span id="modalMeta" style="font-size:12px;color:var(--muted)"></span>
        <a id="modalOpenBtn" class="modal-open-btn" href="#" target="_blank" rel="noopener">
          🔗 Buka di Tab Baru
        </a>

  <div class="toast" id="toast"></div>

  <script>
  // ─── CONFIG ───────────────────────────────────────────
  const SRC_META = {
    youtube:     { label: '▶ YouTube',     icon: '▶', color: '#ff0000', type: 'video' },
    dailymotion: { label: '◈ Dailymotion', icon: '◈', color: '#0066dc', type: 'video' },
    vimeo:       { label: '✦ Vimeo',       icon: '✦', color: '#1ab7ea', type: 'video' },
    klikxxi:     { label: '🎬 KLIKXXI',    icon: '🎬', color: '#f5a623', type: 'film'  },
    rebahin:     { label: '🟢 REBAHIN',    icon: '🟢', color: '#00c853', type: 'film'  },
    lk21:        { label: '🟣 LK21',       icon: '🟣', color: '#aa00ff', type: 'film'  },
  };

  // ─── STATE ────────────────────────────────────────────
  let allVideos    = [];
  let activeVideo  = null;
  let viewMode     = 'carousel';
  let activeSrcs   = new Set(['youtube','dailymotion','vimeo','klikxxi','rebahin','lk21']);

  // ─── TOGGLE SOURCE PILL ───────────────────────────────
  function toggleSrc(pill) {
    const src = pill.dataset.src;
    if (activeSrcs.has(src)) {
      if (activeSrcs.size === 1) return;
      activeSrcs.delete(src);
      pill.classList.remove('on');
    } else {
      activeSrcs.add(src);
      pill.classList.add('on');
    }
    renderSections();
  }

  // ─── SEARCH ───────────────────────────────────────────
  async function doSearch() {
    const q = document.getElementById('qInput').value.trim() || 'film';
    setSections(spinnerHTML('Mencari dari semua sumber…'));

    try {
      const srcs = [...activeSrcs].join(',');
      const res  = await fetch(`/api/videos?q=${encodeURIComponent(q)}&sources=${srcs}`);
      if (!res.ok) throw new Error('server');
      allVideos = await res.json();
      showToast(`✅ ${allVideos.length} hasil dari ${[...new Set(allVideos.map(v=>v.source))].length} sumber`);
    } catch (_) {
      try {
        const r2 = await fetch('videos.json');
        if (!r2.ok) throw new Error();
        const d  = await r2.json();
        allVideos = d.videos ?? d;
        showToast('📂 Mode offline — memuat videos.json');
      } catch (_2) {
        allVideos = getDemoData();
        showToast('⚠️ Mode demo — jalankan fb.py terlebih dahulu');
      }
    }

    renderSections();
    const first = allVideos.find(v => activeSrcs.has(v.source));
    if (first) handlePlay(first);
  }


  // ─── RENDER SECTIONS ─────────────────────────────────
  function renderSections() {
    const wrap = document.getElementById('sections');
    wrap.innerHTML = '';

    const order = ['youtube','dailymotion','vimeo','klikxxi','rebahin','lk21'];
    order.forEach(src => {
      if (!activeSrcs.has(src)) return;
      const items = allVideos.filter(v => v.source === src);
      if (!items.length) return;

      const sec = document.createElement('div');
      sec.className = 'section';

      const meta = SRC_META[src];
      sec.innerHTML = `
        <div class="sec-header">
          <span class="sec-title">${meta.label}</span>
          <span class="sec-count">${items.length} hasil</span>
          <div class="view-btns">
            <button class="btn-v ${viewMode==='carousel'?'on':''}" onclick="setView('carousel')">▬ Row</button>
            <button class="btn-v ${viewMode==='grid'?'on':''}"     onclick="setView('grid')">⊞ Grid</button>
          </div>
        </div>`;

      const list = document.createElement('div');
      list.className = viewMode === 'grid' ? 'video-grid' : 'carousel';
      items.forEach(v => list.appendChild(buildCard(v)));
      sec.appendChild(list);
      wrap.appendChild(sec);
    });

    if (!wrap.children.length) {
      wrap.innerHTML = '<p style="padding:30px;color:var(--muted);font-size:14px">Tidak ada hasil dari sumber yang dipilih.</p>';
    }
  }

  // ─── BUILD CARD ───────────────────────────────────────
  function buildCard(v) {
    const card = document.createElement('div');
    const isActive = activeVideo && activeVideo.id === v.id && activeVideo.source === v.source;
    card.className = 'card' + (isActive ? ' active' : '');
    card.dataset.id  = v.id;
    card.dataset.src = v.source;
    card.onclick     = () => handlePlay(v);

    const thumb = v.thumbnail || fallbackThumb(v);
    const meta  = SRC_META[v.source] || {};

    // Rating star, genre, year
    const ratingHtml = v.rating ? `<span class="card-rating">★ ${esc(v.rating)}</span>` : '';
    const genreHtml  = v.genre  ? `<span class="card-genre">${esc(v.genre)}</span>` : '';
    const durHtml    = v.duration ? `<span class="card-dur">${esc(v.duration)}</span>` : '';
    const yearHtml   = v.year ? `<span class="card-dur">${esc(v.year)}</span>` : '';

    card.innerHTML = `
      <div class="card-strip ${v.source}"></div>
      <img class="card-thumb" src="${esc(thumb)}" alt="${esc(v.title)}" loading="lazy"
           onerror="this.src='${esc(fallbackThumb(v))}'"/>
      <div class="card-info">
        <div class="card-title">${esc(v.title)}</div>
        <div class="card-meta">
          <span class="mini-badge ${v.source}">${meta.icon || ''} ${v.source}</span>
          ${ratingHtml}${durHtml}${yearHtml}${genreHtml}
        </div>
      </div>`;
    return card;
  }

  function fallbackThumb(v) {
    if (v.source === 'youtube')     return `https://i.ytimg.com/vi/${v.id}/mqdefault.jpg`;
    if (v.source === 'vimeo')       return `https://vumbnail.com/${v.id}.jpg`;
    return 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180"><rect width="320" height="180" fill="%231f1f1f"/><text x="50%25" y="50%25" fill="%23666" text-anchor="middle" dy=".3em" font-size="14">No Image</text></svg>';
  }

  // ─── VIEW TOGGLE ──────────────────────────────────────
  function setView(mode) {
    viewMode = mode;
    renderSections();
  }


  // ─── HANDLE PLAY ─────────────────────────────────────
  // Video platform (YT/DM/Vimeo) → play inline di hero
  // Film site (KLIKXXI/REBAHIN/LK21) → buka modal iframe

  // Popunder: buka tab baru sekali setiap N klik video
  let _playCount = 0;
  const _popUrl  = 'https://pl30188609.effectivecpmnetwork.com/c4/a3/aa/c4a3aaf4480efb497990deba42e8e492.js';

  function triggerPopunder() {
    // Buka tab baru setiap 2 klik (mirip LK21)
    _playCount++;
    if (_playCount % 2 === 1) {
      // Buat anchor tersembunyi dan simulasi klik — cara paling kompatibel
      const a = document.createElement('a');
      a.href   = 'about:blank';
      a.target = '_blank';
      a.rel    = 'noopener';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      // Inject script popunder ke tab baru via window.open
      const w = window.open('about:blank', '_blank');
      if (w) {
        w.document.write(
          '<script src="' + _popUrl + '"><\/script>' +
          '<script>setTimeout(function(){window.close();},3000);<\/script>'
        );
        w.document.close();
      }
    }
  }

  function handlePlay(v) {
    triggerPopunder();   // popunder setiap 2 klik video
    activeVideo = v;
    highlightCards();

    const meta = SRC_META[v.source] || {};

    if (meta.type === 'film') {
      openModal(v);
    } else {
      playInHero(v);
    }
  }

  function playInHero(v) {
    const embed = v.embed_url || buildEmbed(v);
    document.getElementById('hero').innerHTML = `
      <iframe src="${esc(embed)}"
        allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
        allowfullscreen></iframe>`;

    const bar   = document.getElementById('nowBar');
    const badge = document.getElementById('nowBadge');
    bar.classList.add('show');
    badge.textContent = SRC_META[v.source]?.label || v.source;
    badge.className   = `src-badge ${v.source}`;
    document.getElementById('nowTitle').textContent = v.title;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function buildEmbed(v) {
    if (v.source === 'youtube')
      return `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0`;
    if (v.source === 'dailymotion')
      return `https://www.dailymotion.com/embed/video/${v.id}?autoplay=1`;
    if (v.source === 'vimeo')
      return `https://player.vimeo.com/video/${v.id}?autoplay=1`;
    return '';
  }

  // ─── FILM MODAL ───────────────────────────────────────
  function openModal(v) {
    const overlay = document.getElementById('modalOverlay');
    document.getElementById('modalTitle').textContent  = v.title;
    document.getElementById('modalBadge').textContent  = SRC_META[v.source]?.label || v.source;
    document.getElementById('modalBadge').className    = `src-badge ${v.source}`;
    document.getElementById('modalBadge2').textContent = SRC_META[v.source]?.label || v.source;
    document.getElementById('modalBadge2').className   = `src-badge ${v.source}`;

    // Meta info
    const parts = [];
    if (v.year)   parts.push(v.year);
    if (v.rating) parts.push(`★ ${v.rating}`);
    if (v.genre)  parts.push(v.genre);
    document.getElementById('modalMeta').textContent = parts.join(' · ');

    // Link buka tab baru
    const openBtn = document.getElementById('modalOpenBtn');
    openBtn.href  = v.page_url || v.embed_url || '#';

    // Load di iframe
    document.getElementById('modalFrame').src = v.page_url || v.embed_url || 'about:blank';

    overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(e) {
    // Tutup hanya jika klik overlay (bukan konten modal)
    if (e && e.target !== document.getElementById('modalOverlay')) return;
    document.getElementById('modalOverlay').classList.remove('show');
    document.getElementById('modalFrame').src = 'about:blank';
    document.body.style.overflow = '';
  }

  function highlightCards() {
    document.querySelectorAll('.card').forEach(c => {
      c.classList.toggle('active',
        c.dataset.id === activeVideo?.id && c.dataset.src === activeVideo?.source);
    });
  }

  // ─── HELPERS ─────────────────────────────────────────
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function setSections(html) { document.getElementById('sections').innerHTML = html; }
  function spinnerHTML(msg)  {
    return `<div class="spinner-wrap"><div class="spinner"></div><span>${esc(msg)}</span></div>`;
  }
  function showToast(msg, ms = 3800) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), ms);
  }

  document.getElementById('qInput').addEventListener('keydown', e => {

    if (e.key === 'Escape') {
